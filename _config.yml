# Usa Feeling Responsive com a tema remot:
remote_theme: Phlow/feeling-responsive

# Configuració específica de Feeling Responsive
# Colores modernos i divertits
colors:
  primary: '#FF6B6B'        # Vermell vibrant
  secondary: '#4ECDC4'      # Turquesa
  accent: '#FFE66D'         # Groc lluminós
  dark: '#2C3E50'           # Gris fosc
  light: '#ECF0F1'          # Gris clar

# Configuració general
